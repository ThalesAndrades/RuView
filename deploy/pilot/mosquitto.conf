# Mosquitto config for the RuView pilot broker.
#
# ───────────────────────────── SECURITY ──────────────────────────────
# This pilot default allows ANONYMOUS connections so the stack comes up
# with zero extra steps on a trusted, isolated LAN. RuView is a privacy
# product for sensitive spaces (bedrooms, bathrooms, elderly care) — DO
# NOT run anonymous on a shared or internet-reachable network.
#
# To require a username + password (recommended before any real pilot):
#   1. Generate a password file (one-time):
#        docker run --rm -v "$PWD:/c" eclipse-mosquitto:2 \
#          mosquitto_passwd -c -b /c/passwd ruview 'CHANGE-ME-strong-pass'
#   2. In docker-compose.yml, uncomment the `./passwd:` volume mount.
#   3. Below, set `allow_anonymous false` and uncomment `password_file`.
#   4. Put the SAME creds in .env (RUVIEW_MQTT_USERNAME / MQTT_PASSWORD)
#      and in Home Assistant's MQTT integration.
# ──────────────────────────────────────────────────────────────────────

listener 1883
protocol mqtt

allow_anonymous true
# allow_anonymous false
# password_file /mosquitto/config/passwd

persistence true
persistence_location /mosquitto/data/

log_dest stdout
log_type warning
log_type notice
